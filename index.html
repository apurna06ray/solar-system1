<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar System</title>
  <link rel="stylesheet" href="styles/styles.css">
</head>

<body>

  <div class="solar-system">

    <div class="sun"></div>

    <div class="orbit mercury">
      <div class="planet">
        <img src="image/mercury.jpg">
      </div>
    </div>

    <div class="orbit venus">
      <div class="planet">
        <img src="image/vinus.jpg">
      </div>
    </div>

    <div class="orbit earth">
      <div class="planet">
        <img src="image/earth.jpg">

        <div class="moon-orbit">
          <div class="moon">
            <img src="image/moon.jpg">
          </div>
        </div>

      </div>
    </div>

    <div class="orbit mars">
      <div class="planet">
        <img src="image/mars.jpg">
      </div>
    </div>

    <div class="orbit jupiter">
      <div class="planet">
        <img src="image/jupiter.jpg">
      </div>
    </div>

    <div class="orbit saturn">
      <div class="planet">
        <img src="image/saturn.jpg">
      </div>
    </div>

    <div class="orbit uranus">
      <div class="planet">
        <img src="image/uranus.jpg">
      </div>
    </div>

    <div class="orbit neptune">
      <div class="planet">
        <img src="image/neptune.jpg">
      </div>
    </div>

  </div>
</body>

</html>
